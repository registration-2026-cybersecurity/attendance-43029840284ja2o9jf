<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Cyber Security Session Registration</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 20px;
            margin-bottom: 10px;
            color: #1a3c5e;
        }

        p {
            font-size: 14px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #155ab6;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Registration to Digital Law Summer School Cybersecurity Session</h1>

    <p>
        Dear participant,<br><br>
Thank you for attending today’s session. Please complete the form below to confirm your attendance and ensure you receive participation records and any follow-up materials.    </p>

    

<form action="https://formspree.io/f/mojzaozk" method="POST">
        
    <input type="text" name="name" placeholder="Full Name *" required>

    <input type="email" name="email" placeholder="Email Address *" required>

    <input type="text" name="Nationality" placeholder="Nationality">

    <input type="text" name="Phone Number" placeholder="Phone Number">

    <button type="submit">Register</button>

</form>



    
</div>

</body>
</html>
